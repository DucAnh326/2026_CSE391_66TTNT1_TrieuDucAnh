<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bai  1</title>
    <link rel="stylesheet" href="assets/css/style-bai_1.css">
</head>
<body>
    <div class="container" id="container">
        <br>
        <h1>Get in touch with us by filling contact form below</h1>
        <form action="contact">
            <div class="form-1st-row">
                <input type="text" id="name" name="name" placeholder="*Enter your full name" required>

                <input type="text" id="email" name="email" placeholder="*Enter your email address" required>
            </div>
            <div class="form-2nd-row">
                <input type="text" id="subject" name="subject" placeholder="Enter your subject">
            </div>
            <div class="form-3rd-row">
                <textarea id="message" name="message" placeholder="*Your message here" required></textarea>
            </div>
            <div class="form-last-row">
                <button type="submit">Send message</button>
                <p class="alert">* Please fill in all required form field, thanks!</p>
            </div>
        </form>
    </div>
</body>
</html>
