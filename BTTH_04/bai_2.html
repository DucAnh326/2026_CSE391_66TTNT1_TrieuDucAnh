<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment - Form Validation</title>
    <link rel="stylesheet" href="assets/css/style-bai_2.css">
</head>
<body>

    <div id="registrationContainer">
        <h2>User Registration</h2>
        <form id="registrationForm" novalidate>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter full name">
                <span class="error" id="fullNameError"></span>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="name@domain.com">
                <span class="error" id="emailError"></span>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="phone" placeholder="0xxxxxxxxx">
                <span class="error" id="phoneError"></span>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="At least 8 characters">
                <span class="error" id="passwordError"></span>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword">
                <span class="error" id="confirmPasswordError"></span>
            </div>

            <div class="form-group">
                <label>Gender</label>
                <div class="options">
                    <input type="radio" name="gender" value="Male" id="male"> Male
                    <input type="radio" name="gender" value="Female" id="female"> Female
                </div>
                <span class="error" id="genderError"></span>
            </div>

            <div class="form-group">
                <label>
                    <input type="checkbox" id="terms"> I agree to the terms
                </label>
                <span class="error" id="termsError"></span>
            </div>

            <button type="submit">Register</button>
        </form>
    </div>

    <div id="orderContainer">
        <h2>Order Form</h2>
        <form id="orderForm" novalidate>
            <div class="form-group">
                <label>Product</label>
                <select id="product">
                    <option value="">-- Select product --</option>
                    <option value="Laptop">Laptop</option>
                    <option value="Phone">Phone</option>
                    <option value="Tablet">Tablet</option>
                </select>
                <span class="error" id="productError"></span>
            </div>

            <div class="form-group">
                <label>Quantity</label>
                <input type="number" id="quantity" value="1">
                <span class="error" id="quantityError"></span>
            </div>

            <div class="total-box">
                Total Price: <span id="totalDisplay">0</span> VND
            </div>

            <div class="form-group">
                <label>Delivery Date</label>
                <input type="date" id="deliveryDate">
                <span class="error" id="deliveryDateError"></span>
            </div>

            <div class="form-group">
                <label>Delivery Address</label>
                <input type="text" id="address" placeholder="At least 10 characters">
                <span class="error" id="addressError"></span>
            </div>

            <div class="form-group">
                <label>Notes (<span id="charCounter">0/200</span>)</label>
                <textarea id="note"></textarea>
                <span class="error" id="noteError"></span>
            </div>

            <div class="form-group">
                <label>Payment Method</label>
                <div class="options">
                    <input type="radio" name="payment" value="COD"> COD
                    <input type="radio" name="payment" value="Bank"> Bank
                    <input type="radio" name="payment" value="E-Wallet"> E-Wallet
                </div>
                <span class="error" id="paymentError"></span>
            </div>

            <button type="submit">Place Order</button>
        </form>

        <div id="confirmationBox" class="modal" style="display: none;">
            <h3>Order Confirmation</h3>
            <div id="summaryContent"></div>
            <p>Confirm this order?</p>
            <button id="confirmBtn">Confirm</button>
            <button id="cancelBtn">Cancel</button>
        </div>
    </div>

    <div id="finalSuccess" style="display: none;"></div>

            <script src="assets/script/script-bai_2.js"></script>
</body>
</html>
