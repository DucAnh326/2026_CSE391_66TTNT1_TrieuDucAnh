<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Registration - Secure System</title>
    <link rel="stylesheet" href="assets/css/style-bai_3.css">
</head>
<body>

    <div id="formContainer">
        <h2 class="title">User Registration</h2>
        <form id="registrationForm" novalidate>
            
            <div class="form-group">
                <label for="fullName">Full Name (<span id="nameCounter">0/50</span>)</label>
                <input type="text" id="fullName" maxlength="50" placeholder="Enter your full name">
                <span class="error" id="fullNameError"></span>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@domain.com">
                <span class="error" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" placeholder="0xxxxxxxxx">
                <span class="error" id="phoneError"></span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="At least 8 characters">
                    <button type="button" id="toggleView" class="toggle-btn">👁</button>
                </div>
                <div class="strength-meter">
                    <div id="strengthBar"></div>
                </div>
                <span class="error" id="passwordError"></span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword">
                <span class="error" id="confirmPasswordError"></span>
            </div>

            <div class="form-group">
                <label>Gender Selection</label>
                <div class="radio-group">
                    <input type="radio" name="gender" value="Male" id="male"> 
                    <label for="male" class="label-inline">Male</label>
                    <input type="radio" name="gender" value="Female" id="female"> 
                    <label for="female" class="label-inline">Female</label>
                </div>
                <span class="error" id="genderError"></span>
            </div>

            <div class="form-group">
                <label class="checkbox-container">
                    <input type="checkbox" id="terms"> I agree to the Terms and Conditions
                </label>
                <span class="error" id="termsError"></span>
            </div>

            <button type="submit" class="submit-btn">Register Account</button>
        </form>
    </div>

    <div id="successDisplay" class="success-screen" style="display: none;"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="assets/script/script-bai_3.js"></script> 
</body>
</html>
